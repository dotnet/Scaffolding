trigger:
  batch: true
  branches:
    include:
    - 'main'
    - 'release/*'

pr:
  branches:
    include:
    - '*'

variables:
  # Cannot use key:value syntax in root defined variables
  - name: _TeamName
    value: DotNetCore
  - name: _PublishUsingPipelines
    value: true
  - name: _DotNetArtifactsCategory
    value: .NETCore
  - template: /eng/common/templates/variables/pool-providers.yml

stages:
- stage: build
  displayName: Build
  jobs:
  - template: /eng/common/templates/jobs/jobs.yml
    parameters:
      enableMicrobuild: true
      enablePublishBuildArtifacts: true
      enablePublishTestResults: true
      enablePublishBuildAssets: true
      enablePublishUsingPipelines: ${{ variables._PublishUsingPipelines }}
      enableTelemetry: true
      helixRepo: dotnet/scaffolding
      codeSign: true
      jobs:
      - job: Windows_NT
        timeoutInMinutes: 180
        pool:
          # For public or PR jobs, use the hosted pool.  For internal jobs use the internal pool.
          # Will eventually change this to two BYOC pools.
          ${{ if or(eq(variables['System.TeamProject'], 'public'), in(variables['Build.Reason'], 'PullRequest')) }}:
            name: $(DncEngPublicBuildPool)
            demands: ImageOverride -equals 1es-windows-2019-open

        variables:
        - _Script: eng\common\build.cmd
        - _ValidateSdkArgs: ''
        - _InternalBuildArgs: '-restore -build -test -sign -pack -ci'

        strategy:
          matrix:
            Build_Release:
              _BuildConfig: Release
              # PRs or external builds are not signed.
              ${{ if or(eq(variables['System.TeamProject'], 'public'), in(variables['Build.Reason'], 'PullRequest')) }}:
                _PublishType: none
                _SignType: test
                _DotNetPublishToBlobFeed : false
                _PublishPackages: ''
            ${{ if eq(variables['System.TeamProject'], 'public') }}:
              Build_Debug:
                _BuildConfig: Debug
                _PublishType: none
                _SignType: test
                _DotNetPublishToBlobFeed : false
                _PublishPackages: '-publish'
        steps:
        - checkout: self
          clean: true
        # Install additional .NET SDKs needed by integration tests.
        # The global.json SDK is .NET 11 preview, but the multi-targeted
        # dotnet-scaffold tool also builds for net8.0, net9.0, and net10.0.
        # Integration tests invoke 'dotnet run --framework net8.0/net9.0/net10.0'
        # which requires those runtimes AND matching SDKs (with MSBuild.dll)
        # to be present on the agent.
        - task: UseDotNet@2
          displayName: Install .NET 8 SDK
          inputs:
            packageType: sdk
            version: 8.x
            installationPath: $(Build.SourcesDirectory)/.dotnet
        - task: UseDotNet@2
          displayName: Install .NET 9 SDK
          inputs:
            packageType: sdk
            version: 9.x
            installationPath: $(Build.SourcesDirectory)/.dotnet
        - task: UseDotNet@2
          displayName: Install .NET 10 SDK
          inputs:
            packageType: sdk
            version: 10.x
            includePreviewVersions: true
            installationPath: $(Build.SourcesDirectory)/.dotnet
        # Use utility script to run script command dependent on agent OS.
        - script: $(_Script)
            -configuration $(_BuildConfig)
            -prepareMachine
            $(_InternalBuildArgs)
            $(_PublishPackages)
            $(_ValidateSdkArgs)
          displayName: Windows Build / Publish

      - ${{ if or(eq(variables['System.TeamProject'], 'public'), in(variables['Build.Reason'], 'PullRequest')) }}:
        - job: OSX
          timeoutInMinutes: 180
          pool:
            vmImage: macOS-latest

          strategy:
            matrix:
              release_configuration:
                _BuildConfig: Release
              ${{ if eq(variables['System.TeamProject'], 'public') }}:
                debug_configuration:
                  _BuildConfig: Debug
          steps:
          - checkout: self
            clean: true
          - task: UseDotNet@2
            displayName: Install .NET 8 SDK
            inputs:
              packageType: sdk
              version: 8.x
              installationPath: $(Build.SourcesDirectory)/.dotnet
          - task: UseDotNet@2
            displayName: Install .NET 9 SDK
            inputs:
              packageType: sdk
              version: 9.x
              installationPath: $(Build.SourcesDirectory)/.dotnet
          - task: UseDotNet@2
            displayName: Install .NET 10 SDK
            inputs:
              packageType: sdk
              version: 10.x
              includePreviewVersions: true
              installationPath: $(Build.SourcesDirectory)/.dotnet
          - script: eng/common/build.sh
              --configuration $(_BuildConfig)
              --prepareMachine
              --restore --build --test --pack --ci
            name: Build
            displayName: Build
            condition: succeeded()

        - job: Linux
          timeoutInMinutes: 180
          pool:
            ${{ if or(ne(variables['System.TeamProject'], 'internal'), in(variables['Build.Reason'], 'Manual', 'PullRequest', 'Schedule')) }}:
              vmImage: ubuntu-22.04
          strategy:
            matrix:
              release_configuration:
                _BuildConfig: Release
              ${{ if eq(variables['System.TeamProject'], 'public') }}:
                debug_configuration:
                  _BuildConfig: Debug
          steps:
          - checkout: self
            clean: true
          - task: UseDotNet@2
            displayName: Install .NET 8 SDK
            inputs:
              packageType: sdk
              version: 8.x
              installationPath: $(Build.SourcesDirectory)/.dotnet
          - task: UseDotNet@2
            displayName: Install .NET 9 SDK
            inputs:
              packageType: sdk
              version: 9.x
              installationPath: $(Build.SourcesDirectory)/.dotnet
          - task: UseDotNet@2
            displayName: Install .NET 10 SDK
            inputs:
              packageType: sdk
              version: 10.x
              includePreviewVersions: true
              installationPath: $(Build.SourcesDirectory)/.dotnet
          - script: eng/common/build.sh
              --configuration $(_BuildConfig)
              --prepareMachine
              --restore --build --test --pack --ci
            name: Build
            displayName: Build
            condition: succeeded()

